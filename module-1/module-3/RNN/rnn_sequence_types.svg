<svg width="700" height="320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="320" fill="#f8f9fa" rx="10"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">RNN Sequence Types</text>

  <!-- Colors -->
  <!-- Many-to-Many (Seq2Seq) -->
  <text x="90" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">Many to Many</text>
  <text x="90" y="72" text-anchor="middle" font-size="9" fill="#8e44ad">(Seq→Seq Unaligned)</text>
  <!-- Inputs -->
  <rect x="45" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="59" y="104" text-anchor="middle" font-size="10" fill="white">X₁</text>
  <rect x="80" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="94" y="104" text-anchor="middle" font-size="10" fill="white">X₂</text>
  <rect x="115" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="129" y="104" text-anchor="middle" font-size="10" fill="white">X₃</text>
  <!-- Hidden -->
  <rect x="45" y="130" width="28" height="28" rx="5" fill="#e74c3c"/><text x="59" y="149" text-anchor="middle" font-size="9" fill="white">H</text>
  <rect x="80" y="130" width="28" height="28" rx="5" fill="#e74c3c"/><text x="94" y="149" text-anchor="middle" font-size="9" fill="white">H</text>
  <rect x="115" y="130" width="28" height="28" rx="5" fill="#e74c3c"/><text x="129" y="149" text-anchor="middle" font-size="9" fill="white">H</text>
  <!-- Outputs -->
  <rect x="45" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="59" y="194" text-anchor="middle" font-size="10" fill="white">Y₁</text>
  <rect x="80" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="94" y="194" text-anchor="middle" font-size="10" fill="white">Y₂</text>
  <rect x="115" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="129" y="194" text-anchor="middle" font-size="10" fill="white">Y₃</text>
  <!-- Arrows -->
  <line x1="73" y1="144" x2="78" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="108" y1="144" x2="113" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="90" y="238" text-anchor="middle" font-size="9" fill="#555">Translation</text>

  <!-- Many-to-One -->
  <text x="250" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a085">Many to One</text>
  <text x="250" y="72" text-anchor="middle" font-size="9" fill="#16a085">(Seq→Vec)</text>
  <rect x="205" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="219" y="104" text-anchor="middle" font-size="10" fill="white">X₁</text>
  <rect x="240" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="254" y="104" text-anchor="middle" font-size="10" fill="white">X₂</text>
  <rect x="275" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="289" y="104" text-anchor="middle" font-size="10" fill="white">X₃</text>
  <rect x="205" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="240" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="275" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="240" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="254" y="194" text-anchor="middle" font-size="10" fill="white">Y</text>
  <line x1="233" y1="144" x2="238" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="268" y1="144" x2="273" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="250" y="238" text-anchor="middle" font-size="9" fill="#555">Movie Review Sentiment</text>

  <!-- One-to-Many -->
  <text x="420" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#d35400">One to Many</text>
  <text x="420" y="72" text-anchor="middle" font-size="9" fill="#d35400">(Vec→Seq)</text>
  <rect x="405" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="419" y="104" text-anchor="middle" font-size="10" fill="white">X</text>
  <rect x="370" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="405" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="440" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="370" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="384" y="194" text-anchor="middle" font-size="10" fill="white">Y₁</text>
  <rect x="405" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="419" y="194" text-anchor="middle" font-size="10" fill="white">Y₂</text>
  <rect x="440" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="454" y="194" text-anchor="middle" font-size="10" fill="white">Y₃</text>
  <line x1="398" y1="144" x2="403" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="433" y1="144" x2="438" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="420" y="238" text-anchor="middle" font-size="9" fill="#555">Image Captioning</text>

  <!-- Seq-Seq Aligned -->
  <text x="600" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Seq-Seq Aligned</text>
  <text x="600" y="72" text-anchor="middle" font-size="9" fill="#c0392b">(POS Tagging)</text>
  <rect x="555" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="569" y="104" text-anchor="middle" font-size="10" fill="white">X₁</text>
  <rect x="590" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="604" y="104" text-anchor="middle" font-size="10" fill="white">X₂</text>
  <rect x="625" y="85" width="28" height="28" rx="5" fill="#3498db"/><text x="639" y="104" text-anchor="middle" font-size="10" fill="white">X₃</text>
  <rect x="555" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="590" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="625" y="130" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="555" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="569" y="194" text-anchor="middle" font-size="10" fill="white">Y₁</text>
  <rect x="590" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="604" y="194" text-anchor="middle" font-size="10" fill="white">Y₂</text>
  <rect x="625" y="175" width="28" height="28" rx="5" fill="#2ecc71"/><text x="639" y="194" text-anchor="middle" font-size="10" fill="white">Y₃</text>
  <line x1="583" y1="144" x2="588" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="618" y1="144" x2="623" y2="144" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="600" y="238" text-anchor="middle" font-size="9" fill="#555">POS Tagging</text>

  <!-- Dividers -->
  <line x1="175" y1="50" x2="175" y2="260" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="340" y1="50" x2="340" y2="260" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="510" y1="50" x2="510" y2="260" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>

  <defs>
    <marker id="a1" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>
